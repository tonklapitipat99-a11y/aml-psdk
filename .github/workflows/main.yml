DECL_HOOKv(CTimer__Update)
{
    CTimer__Update();
    CTimer::m_snTimeInMilliseconds += 5;
    logger->Info("CTimer__Update: %u", CTimer::m_snTimeInMilliseconds);
    CTimer::m_snTimeInMilliseconds -= 5;
}

ON_MOD_LOAD()
{
    logger->SetTag("PSDK Template");
    
    HOOK(CTimer__Update, CTimer::Update); // just an example!
}
